<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ovoz Batl - Statistika</title>
    <!-- Telegram WebApp Script -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <style>
        /* Asosiy stillar */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background: var(--tg-theme-bg-color, #1a1a2e);
            color: var(--tg-theme-text-color, #ffffff);
            min-height: 100vh;
            padding-bottom: 80px; /* Pastki menyu uchun joy */
        }

        /* Header qismi */
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
            text-align: center;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .header h1 {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 5px;
            color: white;
        }

        .real-time-indicator {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(255,255,255,0.2);
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            color: white;
            margin-top: 8px;
        }

        .pulse {
            width: 8px;
            height: 8px;
            background: #00ff88;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(1.2); }
        }

        /* Kontent qismi */
        .section {
            display: none;
            padding: 15px;
            animation: fadeIn 0.3s ease-in-out;
        }

        .section.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .card {
            background: var(--tg-theme-secondary-bg-color, #16213e);
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        .card-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 12px;
            color: #667eea;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* Ovozlar ro'yxati stili */
        .contest-item {
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 10px;
            border-left: 4px solid #667eea;
        }

        .contest-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
            padding-bottom: 8px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .contest-channel {
            font-weight: 600;
            color: #8da2fb;
            font-size: 14px;
        }

        .contest-id {
            background: rgba(102, 126, 234, 0.2);
            padding: 2px 8px;
            border-radius: 6px;
            font-size: 11px;
            color: #ccc;
        }

        .vote-item {
            display: flex;
            align-items: center;
            padding: 6px 0;
            font-size: 13px;
        }

        .vote-from {
            color: #00ff88;
            font-weight: 500;
        }

        .vote-arrow {
            margin: 0 8px;
            color: #888;
        }

        .vote-to {
            color: #ff6b6b;
            font-weight: 500;
        }

        .vote-time {
            margin-left: auto;
            font-size: 11px;
            color: #888;
        }

        /* Profil stili */
        .profile-header {
            text-align: center;
            padding: 20px;
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.1) 0%, rgba(118, 75, 162, 0.1) 100%);
            border-radius: 15px;
            margin-bottom: 15px;
            border: 1px solid rgba(102, 126, 234, 0.3);
        }

        .profile-avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 12px;
            font-size: 32px;
            font-weight: 700;
            color: white;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .profile-name {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 5px;
        }

        .profile-username {
            color: #888;
            font-size: 14px;
        }

        .profile-stats {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }

        .profile-stat-card {
            background: rgba(255,255,255,0.05);
            padding: 15px;
            border-radius: 12px;
            text-align: center;
        }

        .profile-stat-value {
            font-size: 24px;
            font-weight: 700;
            color: #667eea;
        }

        .profile-stat-label {
            font-size: 12px;
            color: #aaa;
            margin-top: 5px;
        }

        /* Aktivlik ro'yxati */
        .activity-item {
            padding: 10px;
            background: rgba(255,255,255,0.03);
            border-radius: 8px;
            margin-bottom: 8px;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .activity-icon {
            font-size: 18px;
        }

        /* Loading spinner */
        .loading {
            text-align: center;
            padding: 30px;
            color: #888;
        }

        .spinner {
            border: 3px solid rgba(255,255,255,0.1);
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Pastki navigatsiya */
        .tabs {
            display: flex;
            background: var(--tg-theme-secondary-bg-color, #16213e);
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 100;
            box-shadow: 0 -4px 15px rgba(0,0,0,0.3);
            padding-bottom: env(safe-area-inset-bottom);
        }

        .tab {
            flex: 1;
            padding: 12px 5px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            border: none;
            background: transparent;
            color: #888;
            font-size: 11px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }

        .tab.active {
            color: #667eea;
            background: rgba(102, 126, 234, 0.1);
        }

        .tab-icon {
            font-size: 20px;
        }

        /* Badge */
        .badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 10px;
            font-weight: 600;
            margin-left: 5px;
        }
        .badge-active { background: rgba(0, 255, 136, 0.2); color: #00ff88; }
    </style>
</head>
<body>

    <!-- Header -->
    <div class="header">
        <h1>🏆 Ovoz Batl</h1>
        <div class="real-time-indicator">
            <div class="pulse"></div>
            <span id="currentTime">00:00:00</span>
        </div>
    </div>

    <!-- 1-Bo'lim: Real Vaqtda Ovozlar -->
    <div class="section active" id="section-votes">
        <div class="card">
            <div class="card-title">📊 Real Vaqtda Ovozlar</div>
            <div id="votes-container">
                <div class="loading">
                    <div class="spinner"></div>
                    Ma'lumotlar yuklanmoqda...
                </div>
            </div>
        </div>
    </div>

    <!-- 2-Bo'lim: Kanallar (Hozircha bo'sh, keyin to'ldirasiz) -->
    <div class="section" id="section-channels">
        <div class="card">
            <div class="card-title">📢 Aktiv Kanallar</div>
            <div id="channels-container">
                <div class="loading">
                    <p>Hozircha aktiv kanallar yo'q.</p>
                </div>
            </div>
        </div>
    </div>

    <!-- 3-Bo'lim: Mening Profilim -->
    <div class="section" id="section-profile">
        <div class="profile-header">
            <div class="profile-avatar" id="profile-avatar">U</div>
            <div class="profile-name" id="profile-name">Yuklanmoqda...</div>
            <div class="profile-username" id="profile-username">@username</div>
        </div>

        <div class="card">
            <div class="card-title">📈 Mening Statistikam</div>
            <div class="profile-stats">
                <div class="profile-stat-card">
                    <div class="profile-stat-value" id="stat-participations">-</div>
                    <div class="profile-stat-label">Qatnashgan</div>
                </div>
                <div class="profile-stat-card">
                    <div class="profile-stat-value" id="stat-wins">-</div>
                    <div class="profile-stat-label">G'alaba</div>
                </div>
                <div class="profile-stat-card">
                    <div class="profile-stat-value" id="stat-votes">-</div>
                    <div class="profile-stat-label">Ovoz berdi</div>
                </div>
                <div class="profile-stat-card">
                    <div class="profile-stat-value" id="stat-created">-</div>
                    <div class="profile-stat-label">Yaratdi</div>
                </div>
            </div>
        </div>

        <div class="card">
            <div class="card-title">🕐 Oxirgi Aktivlik</div>
            <div class="activity-list" id="activity-list">
                <div class="loading">
                    <div class="spinner"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Pastki Menyu -->
    <div class="tabs">
        <button class="tab active" onclick="switchTab('votes')">
            <span class="tab-icon">📊</span>
            <span>Ovozlar</span>
        </button>
        <button class="tab" onclick="switchTab('channels')">
            <span class="tab-icon">📢</span>
            <span>Kanallar</span>
        </button>
        <button class="tab" onclick="switchTab('profile')">
            <span class="tab-icon">👤</span>
            <span>Profil</span>
        </button>
    </div>

    <script>
        // Telegram WebApp ni ishga tushirish
        const tg = window.Telegram.WebApp;
        tg.expand(); // To'liq ekran
        tg.ready();

        // Foydalanuvchi ma'lumotlarini olish
        const user = tg.initDataUnsafe?.user || {};
        const userId = user.id || 0;
        const username = user.username || 'Foydalanuvchi';
        const firstName = user.first_name || '';
        const lastName = user.last_name || '';

        // Profilni yangilash
        document.getElementById('profile-name').textContent = `${firstName} ${lastName}`.trim() || username;
        document.getElementById('profile-username').textContent = user.username ? `@${user.username}` : '';
        document.getElementById('profile-avatar').textContent = (firstName?.[0] || username[0] || 'U').toUpperCase();

        // Soatni yangilash
        function updateClock() {
            const now = new Date();
            document.getElementById('currentTime').textContent = now.toLocaleTimeString('uz-UZ', { 
                hour: '2-digit', minute: '2-digit', second: '2-digit' 
            });
        }
        setInterval(updateClock, 1000);
        updateClock();

        // Tablarni almashtirish funksiyasi
        function switchTab(tabName) {
            // Barcha bo'limlarni yashirish
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));

            // Tanlanganni ko'rsatish
            document.getElementById(`section-${tabName}`).classList.add('active');
            
            // Tugmani aktiv qilish (event.target orqali emas, ID orqali topamiz)
            const tabs = document.querySelectorAll('.tab');
            if(tabName === 'votes') tabs[0].classList.add('active');
            if(tabName === 'channels') tabs[1].classList.add('active');
            if(tabName === 'profile') tabs[2].classList.add('active');

            // Ma'lumotlarni yuklash
            if (tabName === 'votes') loadVotes();
            if (tabName === 'profile') loadProfile();
        }

        // 1. Real vaqtda ovozlarni yuklash
        async function loadVotes() {
            const container = document.getElementById('votes-container');
            
            // Botga so'rov yuborish (agar kerak bo'lsa)
            // tg.sendData(JSON.stringify({ action: 'get_realtime_votes', user_id: userId }));

            // Hozircha simulyatsiya qilingan ma'lumot (Botdan real ma'lumot kelganda o'zgartirasiz)
            // Bu yerda botdan kelgan ma'lumotni kutishingiz mumkin, lekin hozircha statik ko'rsatyapmiz
            
            setTimeout(() => {
                // Agar botdan ma'lumot kelsa, shu yerga HTML generatsiya qilasiz
                // Hozircha bo'sh holatda qoldiramiz yoki namuna ko'rsatamiz
                
                // NAMUNA MA'LUMOT (Buni bot logikasiga ulashingiz kerak)
                container.innerHTML = `
                    <div class="contest-item">
                        <div class="contest-header">
                            <span class="contest-channel">@ovoz_batl_kanal</span>
                            <span class="contest-id">ID: 123</span>
                        </div>
                        <div class="vote-item">
                            <span class="vote-from">@user1</span>
                            <span class="vote-arrow">→</span>
                            <span class="vote-to">@participant1</span>
                            <span class="vote-time">2s oldin</span>
                        </div>
                        <div class="vote-item">
                            <span class="vote-from">@user2</span>
                            <span class="vote-arrow">→</span>
                            <span class="vote-to">@participant2</span>
                            <span class="vote-time">5s oldin</span>
                        </div>
                    </div>
                `;
            }, 500);
        }

        // 2. Profil statistikasini yuklash
        async function loadProfile() {
            // Botga so'rov yuborish
            tg.sendData(JSON.stringify({
                action: 'get_user_profile',
                user_id: userId
            }));

            // Simulyatsiya (Bot javob berguncha)
            setTimeout(() => {
                document.getElementById('stat-participations').textContent = '5';
                document.getElementById('stat-wins').textContent = '1';
                document.getElementById('stat-votes').textContent = '12';
                document.getElementById('stat-created').textContent = '0';
                
                document.getElementById('activity-list').innerHTML = `
                    <div class="activity-item">
                        <span class="activity-icon">🗳️</span>
                        <span>Siz @kanal da ovoz berdingiz</span>
                    </div>
                    <div class="activity-item">
                        <span class="activity-icon">✅</span>
                        <span>Konkursga qatnashdingiz</span>
                    </div>
                `;
            }, 500);
        }

        // Dastlabki yuklash
        loadVotes();

        // Ranglarni Telegram mavzusiga moslash
        document.documentElement.style.setProperty('--tg-theme-bg-color', tg.themeParams.bg_color || '#1a1a2e');
        document.documentElement.style.setProperty('--tg-theme-text-color', tg.themeParams.text_color || '#ffffff');
        document.documentElement.style.setProperty('--tg-theme-secondary-bg-color', tg.themeParams.secondary_bg_color || '#16213e');

    </script>
</body>
</html>
